version: '3.8'

services:
  # ══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ══════════════════════════════════════════════════════════════

  # ── Nginx API Gateway ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      - uploads:/app/uploads:ro
    depends_on:
      - core-service
      - search-service
      - chat-service
      - learning-service
      - notification-service
    restart: unless-stopped

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4-alpine
    environment:
      POSTGRES_DB: teachwise
      POSTGRES_USER: teachwise
      POSTGRES_PASSWORD: teachwise
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "log_min_duration_statement=500"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teachwise"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

  # ── PgBouncer Connection Pooler ────────────────────────────
  pgbouncer:
    image: bitnami/pgbouncer:1.21.0
    environment:
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_USERNAME=teachwise
      - POSTGRESQL_PASSWORD=teachwise
      - POSTGRESQL_DATABASE=teachwise
      - PGBOUNCER_DATABASE=teachwise
      - PGBOUNCER_PORT=6432
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_MAX_CLIENT_CONN=1000
      - PGBOUNCER_DEFAULT_POOL_SIZE=50
      - PGBOUNCER_MIN_POOL_SIZE=10
      - PGBOUNCER_RESERVE_POOL_SIZE=10
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis (cache, sessions, pub/sub, Celery broker) ────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 640M

  # ══════════════════════════════════════════════════════════════
  # APPLICATION SERVICES
  # ══════════════════════════════════════════════════════════════

  # ── Core Service (auth, booking, payment, wallet) ──────────
  core-service:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://teachwise:teachwise@pgbouncer:6432/teachwise
      - REDIS_URL=redis://redis:6379/0
      - SEARCH_SERVICE_URL=http://search-service:5000
      - CHAT_SERVICE_URL=http://chat-service:5000
      - LEARNING_SERVICE_URL=http://learning-service:5000
      - NOTIFICATION_SERVICE_URL=http://notification-service:5000
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped

  # ── Search Service (tutor search + recommendations) ────────
  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://teachwise:teachwise@pgbouncer:6432/teachwise
      - REDIS_URL=redis://redis:6379/0
      - CORE_SERVICE_URL=http://core-service:5000
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  # ── Chat Service (messaging + SocketIO) ────────────────────
  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://teachwise:teachwise@pgbouncer:6432/teachwise
      - REDIS_URL=redis://redis:6379/0
      - CORE_SERVICE_URL=http://core-service:5000
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  # ── Learning Service (assignments, notes, progress) ────────
  learning-service:
    build:
      context: .
      dockerfile: services/learning-service/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://teachwise:teachwise@pgbouncer:6432/teachwise
      - REDIS_URL=redis://redis:6379/0
      - CORE_SERVICE_URL=http://core-service:5000
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  # ── Notification Service (bell + center) ───────────────────
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://teachwise:teachwise@pgbouncer:6432/teachwise
      - REDIS_URL=redis://redis:6379/0
      - CORE_SERVICE_URL=http://core-service:5000
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped

  # ── Celery Worker (background email tasks) ─────────────────
  celery_worker:
    build: .
    command: celery -A celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://teachwise:teachwise@pgbouncer:6432/teachwise
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  redisdata:
