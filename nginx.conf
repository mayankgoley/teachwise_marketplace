# ══════════════════════════════════════════════════════════════
# TeachWise — Microservices API Gateway (nginx)
# Path-based routing to independent Flask services
# ══════════════════════════════════════════════════════════════

# ── Upstream Service Groups ───────────────────────────────────

upstream core_servers {
    ip_hash;  # Sticky sessions for Flask-Login session cookies
    server core-service:5000;
}

upstream search_servers {
    server search-service:5000;
}

upstream chat_servers {
    ip_hash;  # Sticky sessions for SocketIO WebSocket connections
    server chat-service:5000;
}

upstream learning_servers {
    server learning-service:5000;
}

upstream notification_servers {
    server notification-service:5000;
}

# ── Rate Limiting Zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=search:10m rate=15r/s;

server {
    listen 80;
    server_name _;

    # === Security Headers ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # === Gzip Compression ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # === Client Limits ===
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # === Proxy Buffering ===
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # ─────────────────────────────────────────────────────────
    # STATIC FILES (served directly by nginx, bypass Python)
    # ─────────────────────────────────────────────────────────

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─────────────────────────────────────────────────────────
    # BLOCK INTERNAL APIs FROM EXTERNAL ACCESS
    # ─────────────────────────────────────────────────────────

    location /api/internal/ {
        deny all;
        return 403;
    }

    # ─────────────────────────────────────────────────────────
    # SEARCH SERVICE  →  search-service:5001
    # ─────────────────────────────────────────────────────────

    location /search {
        limit_req zone=search burst=10 nodelay;
        proxy_pass http://search_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /api/search {
        limit_req zone=search burst=10 nodelay;
        proxy_pass http://search_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/recommendations {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://search_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────
    # CHAT SERVICE  →  chat-service:5002
    # ─────────────────────────────────────────────────────────

    location /chat/ {
        proxy_pass http://chat_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /chat {
        proxy_pass http://chat_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat WebSocket (SocketIO) — routed to chat-service
    location /socket.io/ {
        proxy_pass http://chat_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─────────────────────────────────────────────────────────
    # LEARNING SERVICE  →  learning-service:5003
    # ─────────────────────────────────────────────────────────

    location /assignment/ {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /assignment {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /note/ {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /whiteboard/ {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /whiteboard {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /recording/ {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /student/progress {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /learning-goals/ {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /learning-goals {
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Learning Service API routes
    location /api/assignments {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/notes/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/learning-goals {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/whiteboard/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://learning_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────
    # NOTIFICATION SERVICE  →  notification-service:5005
    # ─────────────────────────────────────────────────────────

    location /api/notifications {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://notification_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /notifications {
        proxy_pass http://notification_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────
    # HEALTH CHECKS (per service, no rate limit)
    # ─────────────────────────────────────────────────────────

    location = /health {
        proxy_pass http://core_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location = /health/search {
        proxy_pass http://search_servers/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location = /health/chat {
        proxy_pass http://chat_servers/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location = /health/learning {
        proxy_pass http://learning_servers/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location = /health/notification {
        proxy_pass http://notification_servers/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ─────────────────────────────────────────────────────────
    # CORE SERVICE  →  core-service:5000  (catch-all)
    # ─────────────────────────────────────────────────────────

    # Login Rate Limit
    location ~ ^/(student/login|tutor/login|admin/login|guardian/login) {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://core_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Core API (rate limited)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://core_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other routes → core-service (catch-all)
    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://core_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
