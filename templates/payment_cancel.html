{% extends "base.html" %}
{% block title %}Payment Cancelled | TeachWise{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-16 text-center">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-times text-yellow-600 text-3xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Payment Cancelled</h1>
    <p class="text-gray-500 mb-6">Your session was not booked. No charges were made.</p>
    <div class="flex justify-center space-x-4">
      <a href="{{ url_for('main.index') }}"
         class="inline-block bg-blue-600 text-white px-6 py-2.5 rounded-lg font-semibold
                hover:bg-blue-700 transition">
        <i class="fas fa-search mr-1"></i>Find a Tutor</a>
      <a href="{{ url_for('student_bp.dashboard') }}"
         class="inline-block border border-gray-300 text-gray-700 px-6 py-2.5 rounded-lg
                font-semibold hover:bg-gray-50 transition">
        Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
