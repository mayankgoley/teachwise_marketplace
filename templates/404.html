{% extends "base.html" %}
{% block title %}Page Not Found | TeachWise{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4 py-16">
  <div class="text-center">
    <p class="text-9xl font-extrabold text-blue-600 tracking-tight">404</p>
    <h1 class="mt-4 text-3xl font-bold text-gray-800">Page Not Found</h1>
    <p class="mt-3 text-gray-500 max-w-md mx-auto">
      Sorry, we could not find the page you are looking for. It may have been moved or no longer exists.
    </p>
    <div class="mt-8 flex items-center justify-center gap-4">
      <a href="{{ url_for('main.index') }}"
         class="inline-flex items-center px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
        <i class="fas fa-home mr-2"></i>Go Home
      </a>
      <button onclick="history.back()"
              class="inline-flex items-center px-6 py-3 bg-gray-100 text-gray-700 font-semibold rounded-lg hover:bg-gray-200 transition">
        <i class="fas fa-arrow-left mr-2"></i>Go Back
      </button>
    </div>
  </div>
</div>
{% endblock %}
