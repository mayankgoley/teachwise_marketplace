{% extends "base.html" %}
{% block title %}Edit Slot | TeachWise{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
  <a href="{{ url_for('tutor_bp.tutor_dashboard') }}"
     class="text-blue-600 hover:text-blue-800 text-sm font-medium mb-4 inline-block">
    <i class="fas fa-arrow-left mr-1"></i>Back to Dashboard</a>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-4">
      <i class="fas fa-edit text-blue-600 mr-2"></i>Edit Slot</h1>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
        <input type="date" name="date" required value="{{ slot.date.strftime('%Y-%m-%d') }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Start Time</label>
          <input type="time" name="start_time" required value="{{ slot.start_time.strftime('%H:%M') }}"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">End Time</label>
          <input type="time" name="end_time" required value="{{ slot.end_time.strftime('%H:%M') }}"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Mode</label>
        <select name="mode" class="w-full border border-gray-300 rounded-lg px-3 py-2">
          <option value="online" {% if slot.mode == 'online' %}selected{% endif %}>Online</option>
          <option value="in-person" {% if slot.mode == 'in-person' %}selected{% endif %}>In-Person</option>
          <option value="both" {% if slot.mode == 'both' %}selected{% endif %}>Both</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
        <input type="text" name="subject" value="{{ slot.subject or tutor.subject }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Price ($)</label>
        <input type="number" name="price" step="0.01" min="0" value="{{ slot.price }}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
        <i class="fas fa-save mr-1"></i>Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
