{% extends "base.html" %}
{% block title %}Admin Login | TeachWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">
      Admin Login</h2>

    <form method="POST" action="{{ url_for('admin_bp.admin_login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <button type="submit"
              class="w-full bg-gray-800 text-white py-3 rounded-lg font-semibold
                     hover:bg-gray-900 transition">
        Admin Login</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-3">
      <a href="{{ url_for('admin_bp.forgot_password') }}"
         class="text-blue-600 hover:underline">Forgot your password?</a></p>
  </div>
</div>
{% endblock %}
