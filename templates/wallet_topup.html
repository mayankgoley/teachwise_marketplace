{% extends "base.html" %}
{% block title %}Top Up Wallet | TeachWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-plus-circle text-green-600 text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-800">Add Funds</h2>
      <p class="text-gray-500 text-sm mt-1">Top up your wallet balance.</p>
    </div>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Amount (USD)</label>
        <div class="relative">
          <span class="absolute left-3 top-2 text-gray-400 font-medium">$</span>
          <input type="number" name="amount" min="5" max="500" step="0.01"
                 required placeholder="25.00"
                 class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-lg
                        focus:ring-2 focus:ring-green-500 focus:border-transparent">
        </div>
        <p class="text-xs text-gray-400 mt-1">Minimum $5.00, maximum $500.00</p>
      </div>

      <!-- Quick amount buttons -->
      <div class="grid grid-cols-4 gap-2 mb-6">
        <button type="button" onclick="document.querySelector('input[name=amount]').value='10'"
                class="py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50">$10</button>
        <button type="button" onclick="document.querySelector('input[name=amount]').value='25'"
                class="py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50">$25</button>
        <button type="button" onclick="document.querySelector('input[name=amount]').value='50'"
                class="py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50">$50</button>
        <button type="button" onclick="document.querySelector('input[name=amount]').value='100'"
                class="py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50">$100</button>
      </div>

      <button type="submit"
              class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold
                     hover:bg-green-700 transition">
        Continue to Payment</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      <a href="{{ url_for('wallet_bp.wallet_dashboard') }}"
         class="text-blue-600 hover:underline">
        <i class="fas fa-arrow-left mr-1"></i>Back to Wallet</a></p>
  </div>
</div>
{% endblock %}
