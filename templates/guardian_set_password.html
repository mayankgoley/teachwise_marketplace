{% extends "base.html" %}
{% block title %}Set Password | TeachWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-lock text-purple-600 text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Set Your Password</h1>
      <p class="text-gray-500 text-sm mt-1">Hi {{ guardian.name }}, create a password for your guardian dashboard.</p>
    </div>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required minlength="8"
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent"
               placeholder="At least 8 characters">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" name="password_confirm" required
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent"
               placeholder="Repeat your password">
      </div>
      <button type="submit"
              class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition">
        Set Password</button>
    </form>
  </div>
</div>
{% endblock %}
