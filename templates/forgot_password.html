{% extends "base.html" %}
{% block title %}Forgot Password | TeachWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-key text-blue-600 text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-800">Reset Your Password</h2>
      <p class="text-gray-500 text-sm mt-1">
        Enter your email and we'll send you a reset link.</p>
    </div>

    <form method="POST" action="{{ action_url }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"
               placeholder="you@example.com">
      </div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold
                     hover:bg-blue-700 transition">
        Send Reset Link</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      <a href="{{ login_url }}"
         class="text-blue-600 hover:underline">
        <i class="fas fa-arrow-left mr-1"></i>Back to {{ user_type }} Login</a></p>
  </div>
</div>
{% endblock %}
