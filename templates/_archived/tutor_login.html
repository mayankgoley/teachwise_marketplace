{% extends "base.html" %}
{% block title %}Tutor Login | TeachWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">
      <i class="fas fa-chalkboard-teacher mr-2 text-blue-600"></i>Tutor Login</h2>

    <form method="POST" action="{{ url_for('tutor_bp.login') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="loginEmail">Email</label>
        <input type="email" name="email" id="loginEmail" required autocomplete="email"
               aria-label="Email address" aria-required="true"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="loginPassword">Password</label>
        <input type="password" name="password" id="loginPassword" required autocomplete="current-password"
               aria-label="Password" aria-required="true"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold
                     hover:bg-blue-700 transition">
        <i class="fas fa-sign-in-alt mr-1"></i>Log In</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-3">
      <a href="{{ url_for('tutor_bp.forgot_password') }}"
         class="text-blue-600 hover:underline">Forgot your password?</a></p>

    <p class="text-center text-sm text-gray-500 mt-4">
      Not registered yet?
      <a href="{{ url_for('tutor_bp.register') }}"
         class="text-blue-600 hover:underline">Become a tutor</a></p>
  </div>
</div>
{% endblock %}
