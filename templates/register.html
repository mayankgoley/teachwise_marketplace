{% extends "base.html" %}
{% block title %}Register | TeachWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">
      Create Student Account</h2>

    <form method="POST" action="{{ url_for('student_bp.register_student') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- Name -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" name="name" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <!-- Date of Birth -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
        <input type="date" name="date_of_birth" id="dobField" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <!-- Guardian Fields (hidden, shown by JS if under 18) -->
      <div id="guardianSection" class="hidden">
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-4">
          <p class="text-sm text-yellow-800 font-medium">
            <i class="fas fa-info-circle mr-1"></i>
            Since you are under 18, a parent or guardian must verify your account.</p>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Guardian Full Name</label>
          <input type="text" name="guardian_name" id="guardianName"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg
                        focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Guardian Email</label>
          <input type="email" name="guardian_email" id="guardianEmail"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg
                        focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Guardian Phone (optional)</label>
          <input type="tel" name="guardian_phone"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg
                        focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Relationship</label>
          <select name="guardian_relationship"
                  class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            <option value="Parent">Parent</option>
            <option value="Legal Guardian">Legal Guardian</option>
            <option value="Other">Other</option>
          </select></div>
      </div>

      <!-- Timezone -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Your Timezone</label>
        <select name="timezone"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg
                       focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          {% for value, label in timezone_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select></div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required minlength="8"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <!-- Confirm Password -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Confirm Password</label>
        <input type="password" name="confirm_password" required minlength="8"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold
                     hover:bg-blue-700 transition">
        Create Account</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account?
      <a href="{{ url_for('student_bp.login_student') }}"
         class="text-blue-600 hover:underline">Log in</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const detected = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const select = document.querySelector('select[name="timezone"]');
  if (select && detected) {
    for (let option of select.options) {
      if (option.value === detected) { option.selected = true; break; }
    }
  }
});
</script>
{% endblock %}
