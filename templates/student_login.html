{% extends "base.html" %}
{% block title %}Student Login | TeachWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">
      Student Login</h2>

    <form method="POST" action="{{ url_for('student_bp.login_student') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold
                     hover:bg-blue-700 transition">
        Log In</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-3">
      <a href="{{ url_for('student_bp.forgot_password') }}"
         class="text-blue-600 hover:underline">Forgot your password?</a></p>

    <p class="text-center text-sm text-gray-500 mt-4">
      Don't have an account?
      <a href="{{ url_for('student_bp.register_student') }}"
         class="text-blue-600 hover:underline">Sign up</a></p>
    <p class="text-center text-sm text-gray-500 mt-2">
      <a href="{{ url_for('tutor_bp.login') }}"
         class="text-gray-400 hover:underline">Tutor login</a>
      &bull;
      <a href="{{ url_for('admin_bp.admin_login') }}"
         class="text-gray-400 hover:underline">Admin login</a></p>
  </div>
</div>
{% endblock %}
