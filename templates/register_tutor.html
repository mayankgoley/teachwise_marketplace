{% extends "base.html" %}
{% block title %}Tutor Registration | TeachWise{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">
      Become a Tutor</h2>

    <form method="POST" action="{{ url_for('tutor_bp.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" name="name" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
        <select id="categorySelect"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg">
          <option value="">Select a category</option>
        </select></div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Subcategory</label>
        <select id="subcategorySelect"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg" disabled>
          <option value="">Select a subcategory</option>
        </select></div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Primary Subject / Topic</label>
        <select name="subject" id="topicSelect" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg" disabled>
          <option value="">Select a topic</option>
        </select></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Years of Experience</label>
        <input type="number" name="experience" min="0" max="50" value="0"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
        <input type="text" name="address"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Your Timezone</label>
        <select name="timezone"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg
                       focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          {% for value, label in timezone_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select></div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required minlength="8"
               class="w-full px-4 py-2 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold
                     hover:bg-blue-700 transition">
        Register as Tutor</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Already registered?
      <a href="{{ url_for('tutor_bp.login') }}"
         class="text-blue-600 hover:underline">Log in</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Timezone auto-detect
  const detected = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const tzSelect = document.querySelector('select[name="timezone"]');
  if (tzSelect && detected) {
    for (let option of tzSelect.options) {
      if (option.value === detected) { option.selected = true; break; }
    }
  }

  // Cascading category → subcategory → topic dropdowns
  const categories = {{ categories_json|safe }};
  const catEl = document.getElementById('categorySelect');
  const subEl = document.getElementById('subcategorySelect');
  const topEl = document.getElementById('topicSelect');

  categories.forEach(function(c) {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    catEl.appendChild(opt);
  });

  catEl.addEventListener('change', function() {
    subEl.innerHTML = '<option value="">Select a subcategory</option>';
    topEl.innerHTML = '<option value="">Select a topic</option>';
    subEl.disabled = true;
    topEl.disabled = true;

    const cat = categories.find(function(c) { return c.id === catEl.value; });
    if (!cat) return;

    cat.subcategories.forEach(function(s) {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name;
      subEl.appendChild(opt);
    });
    subEl.disabled = false;
  });

  subEl.addEventListener('change', function() {
    topEl.innerHTML = '<option value="">Select a topic</option>';
    topEl.disabled = true;

    const cat = categories.find(function(c) { return c.id === catEl.value; });
    if (!cat) return;
    const sub = cat.subcategories.find(function(s) { return s.id === subEl.value; });
    if (!sub) return;

    sub.topics.forEach(function(t) {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      topEl.appendChild(opt);
    });
    topEl.disabled = false;
  });
});
</script>
{% endblock %}
