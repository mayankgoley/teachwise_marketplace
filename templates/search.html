{% extends "base.html" %}
{% block title %}Find Tutors Near You | TeachWise{% endblock %}

{% block extra_head %}
<!-- Leaflet.js CSS (local) -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/leaflet.css') }}">
<style>
  #map { height: 500px; width: 100%; border-radius: 12px; }
  .tutor-popup { min-width: 200px; }
  .tutor-popup h4 { margin: 0 0 4px 0; color: #0D3B66; }
  .tutor-popup p { margin: 2px 0; font-size: 13px; color: #555; }
  .tutor-popup a { color: #2980B9; text-decoration: none; font-weight: 600; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">

  <!-- Header -->
  <h1 class="text-3xl font-bold text-gray-800 mb-2">Find Tutors Near You</h1>
  <p class="text-gray-500 mb-6">Search by location, subject, and distance</p>

  <!-- Enhanced Filters -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">

    <!-- Row 1: Location + Text Search -->
    <div class="grid md:grid-cols-3 gap-4 mb-4">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Search</label>
        <input type="text" id="textSearch" placeholder="e.g. calculus, PhD, Math..."
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                      focus:ring-2 focus:ring-blue-500"></div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Location</label>
        <div class="flex gap-2">
          <input type="text" id="locationInput" placeholder="Address or city..."
                 class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm">
          <button id="geolocateBtn" title="Use my location"
                  class="px-3 py-2 bg-blue-50 text-blue-600 rounded-lg
                         hover:bg-blue-100"><i class="fas fa-crosshairs"></i></button>
        </div></div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Subject</label>
        <select id="subjectFilter"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
          <option value="">All Subjects</option>
        </select></div>
    </div>

    <!-- Row 2: Advanced Filters (collapsible) -->
    <div id="advancedFilters" class="hidden">
      <div class="grid md:grid-cols-5 gap-4 pt-3 border-t border-gray-100">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">
            Radius: <span id="radiusValue">25</span> km</label>
          <input type="range" id="radiusSlider" min="5" max="100" value="25"
                 step="5" class="w-full"></div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Min Rating</label>
          <select id="minRating"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="">Any</option>
            <option value="3">3+ stars</option>
            <option value="4">4+ stars</option>
            <option value="4.5">4.5+ stars</option>
          </select></div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Price Range</label>
          <div class="flex gap-1">
            <input type="number" id="minPrice" placeholder="Min $" min="0"
                   class="w-1/2 px-2 py-2 border border-gray-300 rounded-lg text-sm">
            <input type="number" id="maxPrice" placeholder="Max $" min="0"
                   class="w-1/2 px-2 py-2 border border-gray-300 rounded-lg text-sm">
          </div></div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Mode</label>
          <select id="modeFilter"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="">Any Mode</option>
            <option value="online">Online</option>
            <option value="in-person">In-Person</option>
          </select></div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Sort By</label>
          <select id="sortBy"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="relevance">Relevance</option>
            <option value="distance">Distance</option>
            <option value="rating_desc">Highest Rating</option>
            <option value="price_asc">Lowest Price</option>
            <option value="price_desc">Highest Price</option>
            <option value="experience_desc">Most Experienced</option>
          </select></div>
      </div>
    </div>

    <!-- Toggle + Search Buttons -->
    <div class="flex justify-between items-center mt-3">
      <button id="toggleAdvanced"
              class="text-sm text-blue-600 hover:underline">
        <i class="fas fa-sliders-h mr-1"></i>Advanced Filters</button>
      <button id="searchBtn"
              class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold
                     hover:bg-blue-700 transition text-sm">
        <i class="fas fa-search mr-2"></i>Search</button>
    </div>
  </div>

  <!-- Map/List Toggle -->
  <div class="flex gap-2 mb-4">
    <button id="mapViewBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm
                                    font-medium">
      <i class="fas fa-map mr-1"></i>Map View</button>
    <button id="listViewBtn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm
                                     font-medium hover:bg-gray-300">
      <i class="fas fa-list mr-1"></i>List View</button>
    <span id="resultCount" class="ml-auto text-sm text-gray-500 self-center"></span>
  </div>

  <!-- Map Container -->
  <div id="mapContainer">
    <div id="map"></div>
  </div>

  <!-- List Container (hidden by default) -->
  <div id="listContainer" class="hidden">
    <div id="tutorList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<!-- Leaflet.js (local) -->
<script src="{{ url_for('static', filename='js/leaflet.js') }}"></script>

<script>
// ============================================================
// POPULATE SUBJECT FILTER FROM CATEGORIES
// ============================================================
(function() {
  const categories = {{ categories_json|safe }};
  const sel = document.getElementById('subjectFilter');
  categories.forEach(function(cat) {
    const group = document.createElement('optgroup');
    group.label = cat.name;
    cat.subcategories.forEach(function(sub) {
      sub.topics.forEach(function(topic) {
        const opt = document.createElement('option');
        opt.value = topic;
        opt.textContent = topic;
        group.appendChild(opt);
      });
    });
    sel.appendChild(group);
  });
})();

// ============================================================
// MAP INITIALIZATION
// ============================================================
const map = L.map("map").setView([33.87, -117.92], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors",
  maxZoom: 19
}).addTo(map);

let markers = [];
let radiusCircle = null;
let searchLat = null;
let searchLng = null;
let tutorData = [];


// ============================================================
// CUSTOM MARKER ICONS
// ============================================================
const tutorIcon = L.divIcon({
  html: '<div style="background:#22c55e;color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)"><i class="fas fa-graduation-cap"></i></div>',
  iconSize: [32, 32],
  iconAnchor: [16, 16],
  popupAnchor: [0, -20],
  className: ""
});

const studentIcon = L.divIcon({
  html: '<div style="background:#3b82f6;color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)"><i class="fas fa-map-pin"></i></div>',
  iconSize: [32, 32],
  iconAnchor: [16, 16],
  popupAnchor: [0, -20],
  className: ""
});

let studentMarker = null;


// ============================================================
// SEARCH FUNCTION (Enhanced for Phase 4)
// ============================================================
async function searchTutors() {
  const q = document.getElementById('textSearch').value.trim();
  const radius = document.getElementById('radiusSlider').value;
  const subject = document.getElementById('subjectFilter').value;
  const minRating = document.getElementById('minRating').value;
  const minPrice = document.getElementById('minPrice').value;
  const maxPrice = document.getElementById('maxPrice').value;
  const mode = document.getElementById('modeFilter').value;
  const sort = document.getElementById('sortBy').value;

  let url = '/api/search?radius=' + radius + '&sort=' + sort;
  if (q) url += '&q=' + encodeURIComponent(q);
  if (searchLat && searchLng) url += '&lat=' + searchLat + '&lng=' + searchLng;
  if (subject) url += '&subject=' + encodeURIComponent(subject);
  if (minRating) url += '&min_rating=' + minRating;
  if (minPrice) url += '&min_price=' + minPrice;
  if (maxPrice) url += '&max_price=' + maxPrice;
  if (mode) url += '&teaching_mode=' + encodeURIComponent(mode);

  try {
    const response = await fetch(url);
    tutorData = await response.json();
    updateMap();
    updateList();
    document.getElementById('resultCount').textContent =
      tutorData.length + ' tutor(s) found';
  } catch (err) { console.error('Search error:', err); }
}


// ============================================================
// UPDATE MAP MARKERS
// ============================================================
function updateMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  if (radiusCircle) map.removeLayer(radiusCircle);
  if (studentMarker) { map.removeLayer(studentMarker); studentMarker = null; }

  // Student search location marker (blue)
  if (searchLat && searchLng) {
    studentMarker = L.marker([searchLat, searchLng], { icon: studentIcon })
      .addTo(map)
      .bindPopup('<div class="tutor-popup"><h4>Your Search Location</h4></div>');
  }

  tutorData.forEach(t => {
    if (!t.lat || !t.lng) return;
    const slotsInfo = t.open_slots > 0
      ? `<p style="color:#27AE60;font-weight:600;">${t.open_slots} open slot${t.open_slots > 1 ? 's' : ''}</p>`
      : '<p style="color:#999;">No open slots</p>';

    // Distance display
    let distText = '';
    if (t.distance_miles !== null && t.distance_miles !== undefined) {
      distText = `<p>${t.distance_miles} mi away</p>`;
    } else if (t.distance_km !== null && t.distance_km !== undefined) {
      distText = `<p>${t.distance_km} km away</p>`;
    }

    // Mode badges
    let modeBadges = '';
    if (t.has_online) modeBadges += '<span style="background:#dbeafe;color:#1d4ed8;padding:1px 6px;border-radius:10px;font-size:11px;margin-right:4px;">Online</span>';
    if (t.has_offline) modeBadges += '<span style="background:#dcfce7;color:#15803d;padding:1px 6px;border-radius:10px;font-size:11px;">In-Person</span>';

    // Price display
    let priceText = '';
    if (t.min_price !== undefined && t.max_price !== undefined && t.min_price !== t.max_price) {
      priceText = `<p>$${t.min_price} - $${t.max_price}/hr</p>`;
    } else if (t.hourly_rate) {
      priceText = `<p>$${t.hourly_rate}/hr</p>`;
    }

    const popup = `
      <div class="tutor-popup">
        <h4>${t.name}</h4>
        <p><strong>${t.subject}</strong></p>
        <p>&#11088; ${t.rating} &bull; ${t.experience} yrs exp</p>
        <p>${modeBadges}</p>
        ${slotsInfo}
        ${distText}
        ${priceText}
        <a href="${t.profile_url}">View Profile &rarr;</a>
      </div>`;

    const marker = L.marker([t.lat, t.lng], { icon: tutorIcon })
      .addTo(map)
      .bindPopup(popup);
    markers.push(marker);
  });

  if (markers.length > 0) {
    const group = L.featureGroup(markers);
    if (studentMarker) group.addLayer(studentMarker);
    map.fitBounds(group.getBounds().pad(0.1));
  }
}


// ============================================================
// UPDATE LIST VIEW
// ============================================================
function updateList() {
  const container = document.getElementById("tutorList");
  if (tutorData.length === 0) {
    container.innerHTML = `
      <div class="col-span-full text-center py-12">
        <i class="fas fa-map-marker-alt text-4xl text-gray-300 mb-4"></i>
        <p class="text-gray-400">No tutors found. Try adjusting your filters.</p></div>`;
    return;
  }

  container.innerHTML = tutorData.map(t => {
    const slotsColor = t.open_slots > 0 ? 'text-green-600 bg-green-50' : 'text-gray-400 bg-gray-50';
    const slotsText = t.open_slots > 0
      ? `${t.open_slots} slot${t.open_slots > 1 ? 's' : ''}`
      : 'No slots';

    // Distance badge
    let distBadge = '';
    if (t.distance_miles !== null && t.distance_miles !== undefined) {
      distBadge = `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">
        <i class="fas fa-route mr-1"></i>${t.distance_miles} mi</span>`;
    } else if (t.distance_km !== null && t.distance_km !== undefined) {
      distBadge = `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">
        <i class="fas fa-route mr-1"></i>${t.distance_km} km</span>`;
    }

    // Mode badges
    let modeBadges = '';
    if (t.has_online) modeBadges += '<span class="text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-700">Online</span> ';
    if (t.has_offline) modeBadges += '<span class="text-xs px-2 py-0.5 rounded-full bg-green-50 text-green-700">In-Person</span>';

    // Price display
    let priceText = '';
    if (t.min_price !== undefined && t.max_price !== undefined && t.min_price > 0 && t.min_price !== t.max_price) {
      priceText = `$${t.min_price}-$${t.max_price}/hr`;
    } else if (t.hourly_rate) {
      priceText = `$${t.hourly_rate}/hr`;
    }

    return `
    <a href="${t.profile_url}"
       class="bg-white rounded-xl shadow-sm border border-gray-100 p-5
              hover:shadow-md transition block">
      <div class="flex items-center space-x-3 mb-3">
        <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center
                    justify-center flex-shrink-0">
          <i class="fas fa-user text-blue-600"></i></div>
        <div class="flex-1">
          <div class="flex items-center justify-between">
            <h4 class="font-semibold text-gray-800">${t.name}</h4>
            <span class="text-xs font-medium px-2 py-1 rounded-full ${slotsColor}">
              <i class="fas fa-calendar-check mr-1"></i>${slotsText}</span>
          </div>
          <p class="text-gray-500 text-sm">${t.subject}</p>
          <div class="flex flex-wrap gap-1 mt-1">${modeBadges}</div></div>
      </div>
      <div class="flex items-center justify-between text-sm text-gray-500">
        <span>&#11088; ${t.rating}</span>
        <span>${t.experience} yrs</span>
        ${distBadge}
        ${priceText ? "<span class='font-medium text-blue-600'>" + priceText + "</span>" : ""}
      </div>
    </a>`}).join("");
}


// ============================================================
// EVENT LISTENERS
// ============================================================

// Radius slider
document.getElementById("radiusSlider").addEventListener("input", function() {
  document.getElementById("radiusValue").textContent = this.value;
});
document.getElementById("radiusSlider").addEventListener("change", searchTutors);

// Subject filter
document.getElementById("subjectFilter").addEventListener("change", searchTutors);

// Advanced filter toggle
document.getElementById('toggleAdvanced').addEventListener('click', function() {
  const panel = document.getElementById('advancedFilters');
  panel.classList.toggle('hidden');
  this.innerHTML = panel.classList.contains('hidden')
    ? '<i class="fas fa-sliders-h mr-1"></i>Advanced Filters'
    : '<i class="fas fa-times mr-1"></i>Hide Filters';
});

// Search button
document.getElementById("searchBtn").addEventListener("click", async function() {
  const address = document.getElementById("locationInput").value.trim();
  if (address) {
    try {
      const res = await fetch(
        "https://nominatim.openstreetmap.org/search?format=json&limit=1&q="
        + encodeURIComponent(address),
        { headers: { "User-Agent": "TeachWise/1.0" } }
      );
      const data = await res.json();
      if (data.length > 0) {
        searchLat = parseFloat(data[0].lat);
        searchLng = parseFloat(data[0].lon);
        map.setView([searchLat, searchLng], 12);
      }
    } catch (err) { console.error("Geocode failed:", err); }
  }
  searchTutors();
});

// Geolocate button (browser GPS)
document.getElementById("geolocateBtn").addEventListener("click", function() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      searchLat = pos.coords.latitude;
      searchLng = pos.coords.longitude;
      map.setView([searchLat, searchLng], 12);
      document.getElementById("locationInput").value = "My Location";
      searchTutors();
    }, function(err) {
      alert("Could not get your location. Please enter an address.");
    });
  }
});

// Map/List toggle
document.getElementById("mapViewBtn").addEventListener("click", function() {
  document.getElementById("mapContainer").classList.remove("hidden");
  document.getElementById("listContainer").classList.add("hidden");
  this.className = "px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium";
  document.getElementById("listViewBtn").className =
    "px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-300";
  map.invalidateSize();
});
document.getElementById("listViewBtn").addEventListener("click", function() {
  document.getElementById("mapContainer").classList.add("hidden");
  document.getElementById("listContainer").classList.remove("hidden");
  this.className = "px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium";
  document.getElementById("mapViewBtn").className =
    "px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-300";
});

// Initial search (show recommended tutors on page load)
searchTutors();
</script>
{% endblock %}
