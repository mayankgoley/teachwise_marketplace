{% extends "base.html" %}
{% block title %}Server Error | TeachWise{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4 py-16">
  <div class="text-center">
    <p class="text-9xl font-extrabold text-red-500 tracking-tight">500</p>
    <h1 class="mt-4 text-3xl font-bold text-gray-800">Something Went Wrong</h1>
    <p class="mt-3 text-gray-500 max-w-md mx-auto">
      We are sorry, but something unexpected happened on our end. Please try again in a moment.
    </p>
    <div class="mt-8 flex items-center justify-center gap-4">
      <button onclick="location.reload()"
              class="inline-flex items-center px-6 py-3 bg-red-500 text-white font-semibold rounded-lg hover:bg-red-600 transition">
        <i class="fas fa-redo mr-2"></i>Try Again
      </button>
      <a href="{{ url_for('main.index') }}"
         class="inline-flex items-center px-6 py-3 bg-gray-100 text-gray-700 font-semibold rounded-lg hover:bg-gray-200 transition">
        <i class="fas fa-home mr-2"></i>Go Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
